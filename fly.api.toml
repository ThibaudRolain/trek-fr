# Fly.io — backend .NET (TrekFr.Api)
# Deploy (depuis la racine du repo) :
#   fly deploy ./backend -c fly.api.toml
# Prérequis secrets :
#   fly secrets set OpenRouteService__ApiKey=... -c fly.api.toml
#   fly secrets set ALLOWED_ORIGINS=https://trek-fr-web.fly.dev -c fly.api.toml

app = "trek-fr-api"
primary_region = "cdg"

[build]
  # Relatif au build context (= ./backend passé en argument à `fly deploy`).
  dockerfile = "Dockerfile"

[env]
  ASPNETCORE_ENVIRONMENT = "Production"
  ASPNETCORE_URLS = "http://+:8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/health"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
