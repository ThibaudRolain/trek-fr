name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (.NET 10)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('backend/**/*.csproj', 'backend/**/*.slnx') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore TrekFr.slnx

      - name: Build
        run: dotnet build TrekFr.slnx --no-restore --configuration Release

      - name: Detect test projects
        id: detect_tests
        shell: bash
        run: |
          projects=$(find . -name '*.Tests.csproj' -o -name '*.Test.csproj' 2>/dev/null)
          if [ -n "$projects" ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "Found test projects:"
            echo "$projects"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "No *.Tests.csproj / *.Test.csproj found."
          fi

      - name: Test
        if: steps.detect_tests.outputs.found == 'true'
        run: dotnet test TrekFr.slnx --no-build --configuration Release --verbosity normal

      - name: Skip tests (none present)
        if: steps.detect_tests.outputs.found == 'false'
        run: echo "No .NET test projects detected — skipping dotnet test."

  frontend:
    name: Frontend (Angular 21)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node LTS
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npx ng build --configuration production

      - name: Test
        run: npx ng test --watch=false
