services:
  postgis:
    image: postgis/postgis:16-3.4
    container_name: trek-fr-postgis
    environment:
      POSTGRES_USER: trek
      POSTGRES_PASSWORD: trek
      POSTGRES_DB: trek_fr
    ports:
      - "5432:5432"
    volumes:
      - postgis-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trek -d trek_fr"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgis-data:
