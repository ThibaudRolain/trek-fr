# Fly.io — frontend Angular (nginx)
# Deploy (depuis la racine du repo) :
#   fly deploy ./frontend -c fly.web.toml
# Avant le build, remplir frontend/src/environments/environment.prod.ts
# avec l'URL publique du backend (ex. https://trek-fr-api.fly.dev).

app = "trek-fr-web"
primary_region = "cdg"

[build]
  # Relatif au build context (= ./frontend passé en argument à `fly deploy`).
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    hard_limit = 500
    soft_limit = 400

  [[http_service.checks]]
    grace_period = "5s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/healthz"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
