<div class="flex h-screen w-screen flex-col bg-slate-900 text-slate-100">
  <header class="flex items-center justify-between border-b border-slate-800 bg-slate-950/80 px-6 py-3 backdrop-blur">
    <div class="flex items-center gap-3">
      <div class="h-7 w-7 rounded-md bg-gradient-to-br from-emerald-400 to-sky-500"></div>
      <div>
        <h1 class="text-base font-semibold tracking-tight">trek-fr</h1>
        <p class="text-xs text-slate-400">Planificateur de treks — pied, VTT, vélo route</p>
      </div>
    </div>
    <div class="text-xs text-slate-400">slice 3 · générateur</div>
  </header>

  <main class="relative flex-1 overflow-hidden">
    <app-map
      [track]="track()"
      [startPoint]="startPoint()"
      [endPoint]="endPoint()"
      [focusBbox]="focusBbox()"
      (mapClick)="onMapClick($event)"
    ></app-map>

    <aside class="pointer-events-none absolute left-4 top-4 flex w-80 flex-col gap-3">
      <div class="pointer-events-auto">
        <app-track-generate
          [startPoint]="startPoint()"
          [endPoint]="endPoint()"
          [mode]="mode()"
          [track]="track()"
          (modeChange)="onModeChange($event)"
          (generated)="onTrackReady($event)"
        ></app-track-generate>
      </div>
      <div class="pointer-events-auto">
        <app-track-stats-panel
          [track]="track()"
        ></app-track-stats-panel>
      </div>
      <div class="pointer-events-auto">
        <app-saved-tracks-panel (loadTrack)="onTrackReady($event)"></app-saved-tracks-panel>
      </div>
    </aside>
    <aside class="pointer-events-none absolute right-4 top-4 flex w-72 flex-col gap-3">
      <div class="pointer-events-auto">
        <app-stages-panel
          [stages]="track()?.stages ?? null"
          (stageFocus)="onStageFocus($event)"
        ></app-stages-panel>
      </div>
      <div class="pointer-events-auto">
        <app-track-weather-panel [forecasts]="weather()"></app-track-weather-panel>
      </div>
    </aside>
  </main>
</div>
